<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #262626;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p {
      color: #a3a3a3;
      margin: 0;
    }
    .small {
      color: #525252;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="message">Redirecting...</p>
    <p class="small">This helps support our price tracking</p>
  </div>
  
  <script>
    // Affiliate IDs
    const AFFILIATE_IDS = {
      amazon: 'Theresmac-20',
      ebay: '5339142921',
    };
    
    // Parse URL params
    const params = new URLSearchParams(window.location.search);
    const retailer = params.get('retailer') || window.location.pathname.split('/').pop();
    const url = params.get('url');
    const query = params.get('query') || 'GPU';
    
    // Track click
    console.log('[Redirect]', { retailer, query, url });
    
    // Determine redirect URL
    let redirectUrl;
    
    if (url && url !== 'null') {
      redirectUrl = url;
      // Add affiliate tags
      if (retailer === 'amazon' && !redirectUrl.includes('tag=')) {
        redirectUrl += (redirectUrl.includes('?') ? '&' : '?') + 'tag=' + AFFILIATE_IDS.amazon;
      }
      if (retailer === 'ebay' && !redirectUrl.includes('campid=')) {
        redirectUrl += (redirectUrl.includes('?') ? '&' : '?') + 'campid=' + AFFILIATE_IDS.ebay;
      }
    } else {
      // Search URLs
      const searchUrls = {
        amazon: `https://www.amazon.com/s?k=${encodeURIComponent(query)}`,
        ebay: `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}`,
        bestbuy: `https://www.bestbuy.com/site/searchpage.jsp?st=${encodeURIComponent(query)}`,
        newegg: `https://www.newegg.com/p/pl?d=${encodeURIComponent(query)}`,
        bh: `https://www.bhphotovideo.com/c/search?q=${encodeURIComponent(query)}`,
        walmart: `https://www.walmart.com/search?q=${encodeURIComponent(query)}`,
        microcenter: `https://www.microcenter.com/search/search_results.aspx?N=&Ntt=${encodeURIComponent(query)}`,
        adorama: `https://www.adorama.com/s?query=${encodeURIComponent(query)}`,
        antonline: `https://www.antonline.com/search?q=${encodeURIComponent(query)}`,
        cdw: `https://cdw.com/search/?key=${encodeURIComponent(query)}`,
      };
      redirectUrl = searchUrls[retailer] || `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }
    
    // Update message
    document.getElementById('message').textContent = 'Redirecting to ' + retailer + '...';
    
    // Redirect
    window.location.href = redirectUrl;
  </script>
</body>
</html>
