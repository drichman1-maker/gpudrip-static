# fly.toml app configuration file generated for gpudrip-static on 2026-03-23T15:08:08-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gpudrip-static'
primary_region = 'iad'

[build]
  builtin = 'static'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/dist'
  url_prefix = '/'
